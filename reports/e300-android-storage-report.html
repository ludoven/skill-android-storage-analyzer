<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Android 存储分析报告</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#1d2129; --sub:#86909c;
    --line:#e5e6eb; --green:#00b42a; --yellow:#ff7d00; --red:#f53f3f;
    --green-bg:#e8ffea; --yellow-bg:#fff7e8; --red-bg:#ffece8;
    --accent:#165dff; --accent-bg:#e8f3ff;
    --radius:14px; --shadow:0 1px 3px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"SF Pro SC","PingFang SC",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;padding:32px 20px 80px;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:1040px;margin:0 auto}
  header{margin-bottom:28px}
  h1{font-size:26px;font-weight:700;letter-spacing:-.5px}
  .meta{color:var(--sub);font-size:13px;margin-top:6px}
  .overview,.summary{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
  .overview{margin-bottom:24px}
  .stats{display:flex;flex-wrap:wrap;gap:24px}
  .stat .k{font-size:12px;color:var(--sub)}
  .stat .v{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}
  .sysgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px 24px;margin-top:20px;padding-top:18px;border-top:1px solid var(--line)}
  .sysgrid div{font-size:13px}
  .sysgrid span{color:var(--sub)}
  .pills{margin:14px 0 0}
  .pill{display:inline-flex;align-items:center;gap:6px;background:#fafbfc;border:1px solid var(--line);
    border-radius:20px;padding:6px 14px;font-size:13px;margin:4px 8px 4px 0;font-weight:600}
  .pill b{font-variant-numeric:tabular-nums}
  .sec{margin-bottom:28px}
  .sec h2{font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .sec h2 .count{font-size:13px;color:var(--sub);font-weight:500}
  table{width:100%;border-collapse:collapse;background:var(--card);
    border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  th,td{text-align:left;padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line)}
  th{background:#fafbfc;color:var(--sub);font-weight:600;font-size:12px;white-space:nowrap}
  tr:last-child td{border-bottom:none}
  td.size{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  td.path{font-family:"SF Mono",ui-monospace,monospace;font-size:12px;color:var(--sub);word-break:break-all}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%}
  .dot.green{background:var(--green)} .dot.yellow{background:var(--yellow)} .dot.red{background:var(--red)} .dot.blue{background:var(--accent)}
  .table-scroll{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow)}
  .table-scroll table{min-width:720px;box-shadow:none}
  .item{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    margin-bottom:12px;border-left:4px solid var(--line);overflow:hidden}
  .item.green{border-left-color:var(--green)}
  .item.yellow{border-left-color:var(--yellow)}
  .item.red{border-left-color:var(--red)}
  .item-head{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;user-select:none}
  .item-head:hover{background:#fafbfc}
  .item-name{font-weight:600;font-size:15px;flex:1}
  .item-badge{font-size:12px;font-weight:600;padding:2px 10px;border-radius:20px;white-space:nowrap}
  .item-badge.green{color:var(--green);background:var(--green-bg)}
  .item-badge.yellow{color:var(--yellow);background:var(--yellow-bg)}
  .item-badge.red{color:var(--red);background:var(--red-bg)}
  .item-size{font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)}
  .chev{color:var(--sub);transition:transform .2s;font-size:12px}
  .item.open .chev{transform:rotate(90deg)}
  .item-body{display:none;padding:0 18px 18px;font-size:14px}
  .item.open .item-body{display:block}
  .item-path{font-family:"SF Mono",ui-monospace,monospace;font-size:12px;color:var(--sub);
    word-break:break-all;margin-bottom:12px;padding:8px 10px;background:#fafbfc;border-radius:8px}
  .field{margin:10px 0}
  .field .label{font-size:12px;color:var(--sub);font-weight:600;margin-bottom:3px}
  .risk{background:var(--red-bg);color:var(--red);padding:8px 12px;border-radius:8px;
    font-size:13px;margin-top:10px}
  .cmd{position:relative;background:#1d2129;color:#e5e6eb;border-radius:10px;
    padding:14px 14px;margin:8px 0;font-family:"SF Mono",ui-monospace,monospace;
    font-size:12.5px;line-height:1.7;overflow-x:auto;white-space:pre}
  .cmd .copy{position:absolute;top:8px;right:8px;background:#2d3138;color:#c9cdd4;
    border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;
    font-family:inherit}
  .cmd .copy:hover{background:#3d424a;color:#fff}
  .cmd .copy.done{background:var(--green);color:#fff}
  .cmd-label{font-size:11px;color:var(--sub);margin:10px 0 2px}
  .action-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
  .run-btn{border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer}
  .run-btn.exec{background:var(--accent-bg);color:var(--accent)}
  .run-btn.exec:hover{background:#d4e4ff}
  .run-btn:disabled{opacity:.45;cursor:default}
  .action-status{font-size:13px}
  .action-status.ok{color:var(--green);font-weight:600}
  .action-status.err{color:var(--red)}
  .action-note{font-size:12px;color:var(--sub);line-height:1.6;margin-top:8px}
  .denied{background:var(--yellow-bg);border:1px solid #ffd591;border-radius:10px;
    padding:12px 14px;font-size:13px;margin-top:12px}
  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:40px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Android 存储分析报告</h1>
    <div class="meta" id="meta"></div>
  </header>
  <div id="app"></div>
  <footer>android-storage-analyzer · adb 只读分析 · 交互模式只执行白名单绿灯动作</footer>
</div>

<script>
const DATA = {"generated_at": "2026-06-02 10:35:30", "scan_seconds": 0, "system": {"serial": "0123456789ABCDEF", "model": "E300", "brand": "", "device": "", "android_version": "11.1", "sdk": "", "fingerprint": "", "volumes": [{"mount": "/data", "filesystem": "/dev/block/mmcblk0p14", "total": "3.9 GB", "used": "2.3 GB", "free": "1.5 GB", "used_percent": "60%", "mounted_on": "/data"}, {"mount": "/sdcard", "filesystem": "/dev/fuse", "total": "3.9 GB", "used": "2.3 GB", "free": "1.5 GB", "used_percent": "60%", "mounted_on": "/storage/emulated"}]}, "top5": [{"rank": 1, "tier": "red", "size": "约 442.0 MB", "type": "应用本体", "name": "com.google.android.gms", "path": "package:com.google.android.gms", "note": "Google Play 服务，本体占用最大，但不属于应直接手删的目标。"}, {"rank": 2, "tier": "red", "size": "约 251.9 MB", "type": "应用本体", "name": "com.android.vending", "path": "package:com.android.vending", "note": "Play 商店应用本体，不建议直接处理。"}, {"rank": 3, "tier": "red", "size": "约 171.9 MB", "type": "应用本体 + 缓存", "name": "org.xbmc.kodi", "path": "package:org.xbmc.kodi", "note": "Kodi 本体约 171.9 MB，缓存约 73.7 MB，是当前最明显的应用级可关注项。"}, {"rank": 4, "tier": "red", "size": "约 157.2 MB", "type": "应用本体", "name": "com.android.chrome", "path": "package:com.android.chrome", "note": "Chrome 应用本体，不是共享存储垃圾。"}, {"rank": 5, "tier": "red", "size": "约 123.4 MB", "type": "应用本体", "name": "com.enjoy.meowclaw.app", "path": "package:com.enjoy.meowclaw.app", "note": "业务应用本体，占用正常，不建议直接清。"}], "green": [], "yellow": [{"name": "/sdcard/Android/data/com.bts.service", "path": "/sdcard/Android/data/com.bts.service", "size": "约 10.9 MB", "content_profile": "共享存储下的应用公开数据目录，体积很小。", "why_manual": "目录可读，但体积只有约 10.9 MB，不值得作为清理优先级。若误删，可能影响对应应用的公开数据。", "disposal": "除非你明确知道这个目录是无用日志或临时文件，否则不建议动它。真正需要清理时，优先在应用内或系统应用管理里处理。", "risk": "直接删除可能导致对应应用丢失外部存储配置或下载内容。"}, {"name": "/sdcard/Android", "path": "/sdcard/Android", "size": "约 12.0 MB", "content_profile": "盒子上所有共享存储 Android 目录总量很小，包含 data/media/obb。", "why_manual": "虽然可读，但总体只有约 12 MB，没有清理价值；其中还夹杂应用共享数据目录。", "disposal": "无需处理。若后续某个目录异常增长，再针对单个包名目录检查。", "risk": "整目录误删会影响多个应用。"}, {"name": "/sdcard/Screenshots", "path": "/sdcard/Screenshots", "size": "约 32 KB", "content_profile": "截图目录，体积极小。", "why_manual": "这类目录通常是用户内容，但当前几乎为空。", "disposal": "无需处理。", "risk": "删除后会丢失截图。"}], "red": [{"name": "org.xbmc.kodi", "path": "package:org.xbmc.kodi", "size": "约 171.9 MB + 73.7 MB 缓存", "why_keep": "这是当前最显眼的应用级占用，但释放它需要应用级操作，不应当作文件夹垃圾直接删。", "indirect_release": "若你想回收这部分空间，优先在盒子设置里的应用管理里清理 Kodi 缓存；如果已不用 Kodi，再考虑卸载应用。", "auto_reclaim": "应用内清缓存或系统应用管理最合适。"}, {"name": "com.google.android.gms", "path": "package:com.google.android.gms", "size": "约 442.0 MB", "why_keep": "Google Play 服务属于系统关键组件，不能为了腾空间盲动。", "indirect_release": "不建议手动处理；如遇异常，最多通过系统应用管理清缓存，而不是卸载或删目录。", "auto_reclaim": "通常无须处理。"}, {"name": "com.android.vending", "path": "package:com.android.vending", "size": "约 251.9 MB", "why_keep": "Play 商店应用本体，不属于共享存储垃圾。", "indirect_release": "只在排障时考虑清缓存，不建议把它作为常规释放空间目标。", "auto_reclaim": "通常无须处理。"}, {"name": "com.android.chrome", "path": "package:com.android.chrome", "size": "约 157.2 MB", "why_keep": "Chrome 占用主要是应用本体，不是共享存储目录堆积。", "indirect_release": "如果盒子几乎不用 Chrome，可考虑禁用或通过应用管理清缓存；不要在共享存储里盲删。", "auto_reclaim": "应用管理清缓存。"}], "denied": [], "warnings": ["当前盒子没有明显的大型 Download、DCIM、Pictures、Movies 或 Android/media/obb 目录。", "应用级数据主要来自 dumpsys diskstats 汇总，属于应用本体与缓存视角，而不是共享存储文件扫描。", "本次未发现值得作为一键清理对象的绿灯目录。"], "summary": {"overview": "这台 E300 盒子的存储状态正常，/data 与共享存储都只用了约 60%。没有发现大的下载目录、媒体目录或共享存储垃圾；当前占用主要是应用本体，其中最值得关注的是 Kodi 的应用体积与缓存。", "tier_stats": {"green": "约 0 GB", "yellow": "约 0.0 GB", "red": "约 1.0 GB"}, "priority": ["当前不需要做文件级清理，盒子没有明显的共享存储垃圾。", "如果你只是想进一步压缩占用，优先看 Kodi 的缓存，其次再看 Chrome 或其他不常用应用。", "不要把 Google Play 服务或 Play 商店当成清理目标。"], "long_term": ["后续如果安装更多流媒体或播放器应用，再定期检查 /sdcard/Android/data、Android/media 和 Download。", "对 TV 盒子，更常见的空间增长来源是应用缓存和更新包，不是照片视频。", "当系统提示空间紧张时，先用应用管理清缓存，再决定是否卸载不常用应用。"]}};
const DELETE = null;
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const cleanSize = s => String(s==null?'':s).replace(/[（(]\s*估算[^）)]*[）)]/g, '').trim();
function copyBtn(text){
  return `<button class="copy" data-cmd="${btoa(unescape(encodeURIComponent(text)))}">复制</button>`;
}
function cmdBlock(c){
  const label = c.label ? `<div class="cmd-label">${esc(c.label)}</div>` : '';
  return `${label}<div class="cmd">${copyBtn(c.cmd)}${esc(c.cmd)}</div>`;
}
function parseGB(str){
  if(!str) return 0;
  const m=String(str).match(/([\d.]+)\s*(TB|GB|MB|KB)?/i);
  if(!m) return 0;
  let v=parseFloat(m[1]); const u=(m[2]||'GB').toUpperCase();
  if(u==='TB') v*=1024; else if(u==='MB') v/=1024; else if(u==='KB') v/=1024/1024;
  return v;
}
function renderSystem(s, sm){
  document.getElementById('meta').textContent =
    `生成于 ${DATA.generated_at || '-'}　·　扫描耗时 ${DATA.scan_seconds || '?'}s`;
  const vols = s.volumes || [];
  const main = vols.find(v => v.mount === '/data') || vols[0] || {};
  const ts = sm && sm.tier_stats;
  const g = ts ? parseGB(ts.green) : 0;
  const y = ts ? parseGB(ts.yellow) : 0;
  const r = ts ? parseGB(ts.red) : 0;
  const mainUsed = parseGB(main.used);
  const mainTotal = parseGB(main.total) || 1;
  const other = Math.max(0, mainUsed - g - y - r);
  const seg=(v,cls,label)=> v>0?`<i class="${cls}" style="display:block;height:100%;width:${(v/mainTotal*100).toFixed(2)}%" title="${label}：约 ${v.toFixed(1)} GB"></i>`:'';
  const bar = `<div style="height:16px;border-radius:8px;background:var(--line);overflow:hidden;display:flex;margin:16px 0 12px">
    ${seg(g,'seg-green','可优先清理').replace('class="seg-green"','style="display:block;height:100%;background:var(--green);width:'+((g/mainTotal*100).toFixed(2))+'%"')}
    ${seg(y,'seg-yellow','需人工判断').replace('class="seg-yellow"','style="display:block;height:100%;background:var(--yellow);width:'+((y/mainTotal*100).toFixed(2))+'%"')}
    ${seg(r,'seg-red','谨慎处理').replace('class="seg-red"','style="display:block;height:100%;background:var(--red);width:'+((r/mainTotal*100).toFixed(2))+'%"')}
    ${seg(other,'seg-blue','系统及其他').replace('class="seg-blue"','style="display:block;height:100%;background:var(--accent);width:'+((other/mainTotal*100).toFixed(2))+'%"')}
  </div>`;
  const pills = ts ? `<div class="pills">
      <span class="pill"><span class="dot green"></span>可优先清理 <b>${esc(cleanSize(ts.green))}</b></span>
      <span class="pill"><span class="dot yellow"></span>需人工判断 <b>${esc(cleanSize(ts.yellow))}</b></span>
      <span class="pill"><span class="dot red"></span>谨慎处理 <b>${esc(cleanSize(ts.red))}</b></span>
      <span class="pill"><span class="dot blue"></span>系统及其他 <b>约 ${other.toFixed(1)} GB</b></span>
    </div>` : '';
  return `<div class="overview">
    <div class="stats">
      <div class="stat"><div class="k">设备</div><div class="v">${esc((s.brand || '') + ' ' + (s.model || '')).trim() || '-'}</div></div>
      <div class="stat"><div class="k">Android</div><div class="v">${esc(s.android_version || '-')} / SDK ${esc(s.sdk || '-')}</div></div>
      <div class="stat"><div class="k">主分区已用</div><div class="v">${esc(main.used || '-')}</div></div>
      <div class="stat"><div class="k">主分区可用</div><div class="v">${esc(main.free || '-')}</div></div>
    </div>
    ${bar}
    ${pills}
    <div class="sysgrid">
      <div><span>Serial　</span>${esc(s.serial || '-')}</div>
      <div><span>Device　</span>${esc(s.device || '-')}</div>
      <div><span>Fingerprint　</span>${esc(s.fingerprint || '-')}</div>
    </div>
    ${vols.length ? `<div class="sysgrid">${vols.map(v => `<div><span>${esc(v.mount)}　</span>${esc(v.used)} / ${esc(v.total)} · ${esc(v.used_percent || '')}</div>`).join('')}</div>` : ''}
  </div>`;
}
function renderTop5(rows){
  if(!rows||!rows.length) return '';
  const body = rows.map(r=>`<tr>
    <td>${esc(r.rank)}</td>
    <td><span class="dot ${esc(r.tier)}"></span></td>
    <td class="size">${esc(cleanSize(r.size))}</td>
    <td>${esc(r.type)}</td>
    <td><b>${esc(r.name)}</b></td>
    <td class="path">${esc(r.path)}</td>
    <td>${esc(r.note || '')}</td>
  </tr>`).join('');
  return `<div class="sec"><h2>占用排行 Top 5</h2>
    <div class="table-scroll"><table><thead><tr><th>#</th><th>级</th><th>大小</th><th>类型</th><th>项目</th><th>路径</th><th>说明</th></tr></thead>
    <tbody>${body}</tbody></table></div></div>`;
}
function actionButtons(item, idx){
  if(!DELETE || !item.cleanup_actions || !item.cleanup_actions.length) return '';
  return item.cleanup_actions.map((action, i) => `
    <div class="action-row">
      <button class="run-btn exec" data-action="${idx}:${i}">${esc(action.label || '执行清理')}</button>
      <span class="action-status" id="status-${idx}-${i}"></span>
    </div>
    <div class="action-note">${esc(action.description || '会在当前 adb 设备上执行白名单 shell 清理命令。')}</div>
  `).join('');
}
function renderItems(title, items, tier){
  if(!items||!items.length) return '';
  const count = `<span class="count">${items.length} 项</span>`;
  return `<div class="sec"><h2>${esc(title)} ${count}</h2>${items.map((item, idx) => `
    <div class="item ${esc(tier)}">
      <div class="item-head" data-toggle="${tier}-${idx}">
        <div class="item-name">${esc(item.name)}</div>
        <div class="item-badge ${esc(tier)}">${esc(cleanSize(item.size || item.size_estimate || ''))}</div>
        <div class="item-size">${esc(item.type || '')}</div>
        <div class="chev">▶</div>
      </div>
      <div class="item-body">
        <div class="item-path">${esc(item.path || '')}</div>
        ${item.content_profile ? `<div class="field"><div class="label">内容画像</div><div>${esc(item.content_profile)}</div></div>` : ''}
        ${item.why_manual ? `<div class="field"><div class="label">为什么要人工判断</div><div>${esc(item.why_manual)}</div></div>` : ''}
        ${item.disposal ? `<div class="field"><div class="label">建议处理</div><div>${esc(item.disposal)}</div></div>` : ''}
        ${item.why_keep ? `<div class="field"><div class="label">为什么谨慎</div><div>${esc(item.why_keep)}</div></div>` : ''}
        ${item.indirect_release ? `<div class="field"><div class="label">正规释放方式</div><div>${esc(item.indirect_release)}</div></div>` : ''}
        ${item.risk ? `<div class="risk">${esc(item.risk)}</div>` : ''}
        ${(item.commands || []).map(cmdBlock).join('')}
        ${tier === 'green' ? actionButtons(item, `${tier}-${idx}`) : ''}
      </div>
    </div>`).join('')}</div>`;
}
function renderSummary(sm){
  return `<div class="summary">
    <h2>执行建议</h2>
    <div>${esc(sm.overview || '')}</div>
    <h3 style="font-size:15px;margin:18px 0 8px">优先级</h3>
    <ul>${(sm.priority || []).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
    <h3 style="font-size:15px;margin:18px 0 8px">长期建议</h3>
    <ul>${(sm.long_term || []).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
    ${!DELETE ? `<div class="denied">当前是静态报告模式，只支持查看和复制命令。要启用一键执行，请用 <code>python3 scripts/server.py &lt;analysis.json&gt;</code> 打开。</div>` : ''}
  </div>`;
}
function renderWarnings(){
  const warnings = [...(DATA.denied || []), ...(DATA.warnings || [])];
  if(!warnings.length) return '';
  return `<div class="sec"><div class="denied"><b>限制与告警</b><ul style="margin-top:8px;padding-left:18px">${warnings.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div></div>`;
}
document.getElementById('app').innerHTML = [
  renderSystem(DATA.system || {}, DATA.summary || {}),
  renderTop5(DATA.top5 || []),
  renderSummary(DATA.summary || {}),
  renderItems('🟢 可优先清理', DATA.green || [], 'green'),
  renderItems('🟡 需人工判断', DATA.yellow || [], 'yellow'),
  renderItems('🔴 谨慎处理', DATA.red || [], 'red'),
  renderWarnings()
].join('');

document.querySelectorAll('.item-head').forEach(head => {
  head.addEventListener('click', () => head.parentElement.classList.toggle('open'));
});
document.querySelectorAll('.copy').forEach(btn => {
  btn.addEventListener('click', async () => {
    const text = decodeURIComponent(escape(atob(btn.dataset.cmd)));
    await navigator.clipboard.writeText(text);
    btn.textContent = '已复制';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('done'); }, 1200);
  });
});
if (DELETE) {
  document.querySelectorAll('.run-btn.exec').forEach(btn => {
    btn.addEventListener('click', async () => {
      const [itemKey, actionIndex] = btn.dataset.action.split(':');
      const tier = itemKey.split('-')[0];
      const idx = Number(itemKey.split('-')[1]);
      const action = DATA[tier][idx].cleanup_actions[Number(actionIndex)];
      const status = document.getElementById(`status-${itemKey}-${actionIndex}`);
      if (!confirm(`确认在设备 ${DATA.system.serial || ''} 上执行？\n\n${action.command}`)) return;
      btn.disabled = true; status.textContent = '执行中...'; status.className = 'action-status';
      try {
        const res = await fetch(DELETE.endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token: DELETE.token,
            item: itemKey,
            action_index: Number(actionIndex)
          })
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || '执行失败');
        status.textContent = '已执行';
        status.className = 'action-status ok';
      } catch (err) {
        status.textContent = err.message || String(err);
        status.className = 'action-status err';
        btn.disabled = false;
      }
    });
  });
}
</script>
</body>
</html>
